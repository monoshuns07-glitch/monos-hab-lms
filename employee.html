<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Сургалтын самбар — МОНОС ХҮНС ХК</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Manrope:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<style>
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}
:root{
  --red:#E30613;--red2:#FF2040;
  --red-dark:#B00510;--red-soft:rgba(227,6,19,.08);
  --gold:#F59E0B;--gold2:#FCD34D;
  --blue:#3B82F6;--blue2:#2563EB;--blue-soft:rgba(59,130,246,.10);
  --green:#10B981;--green2:#059669;--green-soft:rgba(16,185,129,.10);
  --orange:#F97316;--orange-soft:rgba(249,115,22,.10);
  --ink:#0F1117;--ink2:#374151;--muted:#6B7280;
  --bg:#F4F6FB;--surface:#FFFFFF;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.11);
  --sh1:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.07);
  --sh2:0 4px 8px rgba(0,0,0,.05),0 12px 32px rgba(0,0,0,.09);
  --sh3:0 8px 16px rgba(0,0,0,.05),0 24px 60px rgba(0,0,0,.11);
  --sh4:0 16px 32px rgba(0,0,0,.05),0 48px 100px rgba(0,0,0,.13);
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Manrope',sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;overflow-x:hidden;
}

/* ── Canvas ── */
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.5}

/* ── Orbs ── */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:orbDrift ease-in-out infinite}
.orb1{width:700px;height:700px;top:-200px;left:-150px;
  background:radial-gradient(circle,rgba(227,6,19,.07) 0%,transparent 65%);
  filter:blur(80px);animation-duration:22s}
.orb2{width:500px;height:500px;bottom:-150px;right:-100px;
  background:radial-gradient(circle,rgba(245,158,11,.06) 0%,transparent 65%);
  filter:blur(70px);animation-duration:28s;animation-delay:-11s}
@keyframes orbDrift{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(24px,-30px) scale(1.05)}
  66%{transform:translate(-18px,22px) scale(.97)}
}

/* ── Loading screen ── */
#loadingScreen{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  transition:opacity .4s ease;
}
#loadingScreen.fade-out{opacity:0;pointer-events:none}
.loading-logo{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(135deg,var(--red),var(--red-dark));
  display:grid;place-items:center;
  animation:loadPulse 1.4s ease-in-out infinite;
}
@keyframes loadPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(227,6,19,.3);transform:scale(1)}
  50%{box-shadow:0 0 0 16px rgba(227,6,19,0);transform:scale(1.05)}
}
.loading-logo svg{width:34px;height:34px;fill:none;stroke:#fff;stroke-width:2}

/* ── Top nav ── */
.nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  box-shadow:var(--sh1);
  display:flex;align-items:center;padding:0 24px;gap:12px;
}
.nav-brand{display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0}
.nav-brand-logo{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--red),var(--red-dark));
  display:grid;place-items:center;flex-shrink:0;
}
.nav-brand-logo svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2}
.nav-brand-text{display:flex;flex-direction:column;line-height:1.25}
.nav-brand-title{font-size:13px;font-weight:700;color:var(--ink)}
.nav-brand-sub{font-size:11px;color:var(--muted);font-weight:500}
.nav-divider{width:1px;height:22px;background:var(--border2);flex-shrink:0;margin:0 4px}
.nav-links{display:flex;align-items:center;gap:2px;flex:1}
.nav-link{
  display:flex;align-items:center;gap:6px;padding:7px 13px;
  border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);
  text-decoration:none;transition:all .18s;border:none;background:none;cursor:pointer;
}
.nav-link:hover{color:var(--ink);background:rgba(0,0,0,.05)}
.nav-link.active{color:var(--red);background:var(--red-soft)}
.nav-link svg{width:16px;height:16px;stroke:currentColor;fill:none;flex-shrink:0;stroke-width:2}
.nav-user{display:flex;align-items:center;gap:10px;margin-left:auto}
.nav-user-info{display:flex;flex-direction:column;align-items:flex-end}
.nav-name{font-size:13px;font-weight:700;color:var(--ink)}
.nav-pos{font-size:11px;color:var(--muted)}
.nav-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--red),var(--gold));
  display:grid;place-items:center;
  font-size:13px;font-weight:700;color:#fff;
  border:2px solid #fff;box-shadow:var(--sh1);
}
.btn-logout{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:9px;
  font-size:13px;font-weight:600;color:var(--muted);
  border:1px solid var(--border2);background:#fff;cursor:pointer;
  transition:all .18s;font-family:inherit;
}
.btn-logout:hover{color:var(--red);border-color:rgba(227,6,19,.3);background:var(--red-soft)}
.btn-logout svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}

/* ── Main ── */
.main{
  position:relative;z-index:10;
  padding-top:calc(var(--nav-h) + 28px);
  padding-bottom:64px;
  max-width:1080px;margin:0 auto;
  padding-left:24px;padding-right:24px;
}

/* ── Hero card ── */
.hero{
  background:var(--surface);border-radius:20px;
  border:1px solid var(--border);box-shadow:var(--sh2);
  padding:28px 32px;margin-bottom:20px;
  display:flex;align-items:center;gap:24px;
  position:relative;overflow:hidden;
  animation:fadeUp .5s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.hero::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(227,6,19,.07) 0%,transparent 60%);
  pointer-events:none;
}
.hero-avatar{
  width:68px;height:68px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--red),var(--gold));
  display:grid;place-items:center;
  font-size:24px;font-weight:800;color:#fff;
  border:3px solid rgba(255,255,255,.9);
  box-shadow:0 4px 16px rgba(227,6,19,.22);
}
.hero-content{flex:1;min-width:0}
.hero-greeting{
  font-size:20px;font-weight:800;color:var(--ink);
  margin-bottom:6px;line-height:1.3;
}
.hero-greeting em{font-style:normal;color:var(--red)}
.hero-badges{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.hero-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:600;
}
.hero-badge.dept{background:var(--blue-soft);color:var(--blue2)}
.hero-badge.pos{background:rgba(0,0,0,.05);color:var(--ink2)}
.hero-date{font-size:12px;color:var(--muted)}
.hero-ring-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px}
.hero-ring{position:relative;width:78px;height:78px}
.hero-ring svg{width:78px;height:78px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(0,0,0,.07);stroke-width:6}
.ring-fill{
  fill:none;stroke:var(--red);stroke-width:6;stroke-linecap:round;
  stroke-dasharray:220;stroke-dashoffset:220;
  transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);
}
.ring-label{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.ring-pct{font-size:17px;font-weight:800;color:var(--ink);line-height:1}
.ring-sub{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:1px}

/* ── Stats grid ── */
.stats-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px;margin-bottom:24px;
  animation:fadeUp .5s .1s cubic-bezier(.2,.8,.2,1) both;
}
.stat-card{
  background:var(--surface);border-radius:16px;
  border:1px solid var(--border);box-shadow:var(--sh1);
  padding:18px 20px;display:flex;align-items:flex-start;gap:14px;
  transition:transform .2s,box-shadow .2s;cursor:default;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.stat-icon{
  width:42px;height:42px;border-radius:11px;flex-shrink:0;
  display:grid;place-items:center;
}
.stat-icon svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2}
.stat-icon.red{background:var(--red-soft);color:var(--red)}
.stat-icon.blue{background:var(--blue-soft);color:var(--blue2)}
.stat-icon.green{background:var(--green-soft);color:var(--green2)}
.stat-body{flex:1;min-width:0}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.stat-value{font-size:24px;font-weight:800;color:var(--ink);line-height:1.1;margin-bottom:2px}
.stat-value sub{font-size:13px;font-weight:600;color:var(--muted);vertical-align:baseline}
.stat-hint{font-size:11px;color:var(--muted)}

/* ── Section header ── */
.section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.section-title{
  font-size:15px;font-weight:700;color:var(--ink);
  display:flex;align-items:center;gap:8px;
}
.section-title svg{width:17px;height:17px;stroke:var(--red);fill:none;stroke-width:2.2}
.section-meta{font-size:12px;color:var(--muted)}

/* ── Filter bar ── */
.filter-bar{
  display:flex;align-items:center;gap:8px;
  margin-bottom:14px;flex-wrap:wrap;
  animation:fadeUp .5s .15s cubic-bezier(.2,.8,.2,1) both;
}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:300px}
.search-wrap svg{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;stroke:var(--muted);fill:none;pointer-events:none;stroke-width:2;
}
.search-input{
  width:100%;padding:8px 12px 8px 32px;
  border-radius:10px;border:1px solid var(--border2);
  background:#fff;font-family:inherit;font-size:13px;color:var(--ink);
  outline:none;transition:border-color .18s,box-shadow .18s;
}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(227,6,19,.09)}
.filter-chip{
  padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:600;
  border:1px solid var(--border2);background:#fff;color:var(--muted);
  cursor:pointer;transition:all .18s;white-space:nowrap;font-family:inherit;
}
.filter-chip:hover{color:var(--ink);border-color:var(--border2)}
.filter-chip.active{background:var(--red);color:#fff;border-color:var(--red)}

/* ── Chapter cards ── */
.chapter-list{
  display:flex;flex-direction:column;gap:10px;
  animation:fadeUp .5s .2s cubic-bezier(.2,.8,.2,1) both;
}
.chapter-card{
  background:var(--surface);border-radius:16px;
  border:1px solid var(--border);box-shadow:var(--sh1);
  overflow:hidden;transition:box-shadow .2s;
}
.chapter-card:hover{box-shadow:var(--sh2)}
.chapter-head{
  display:flex;align-items:center;gap:13px;
  padding:16px 20px;cursor:pointer;user-select:none;
  transition:background .15s;
}
.chapter-head:hover{background:rgba(0,0,0,.02)}
.chapter-num{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:var(--red-soft);
  display:grid;place-items:center;
  font-size:13px;font-weight:800;color:var(--red);
  font-family:'Fraunces',serif;
}
.chapter-info{flex:1;min-width:0}
.chapter-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.chapter-desc{
  font-size:12px;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.chapter-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ch-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:600;
}
.ch-pill.total{background:rgba(0,0,0,.05);color:var(--ink2)}
.ch-pill.done{background:var(--green-soft);color:var(--green2)}
.ch-pill.prog{background:var(--blue-soft);color:var(--blue2)}
.chapter-chevron{
  width:18px;height:18px;flex-shrink:0;
  stroke:var(--muted);fill:none;stroke-width:2.5;
  transition:transform .3s ease;
}
.chapter-card.open .chapter-chevron{transform:rotate(180deg)}

.chapter-body{
  display:none;
  border-top:1px solid var(--border);
}
.chapter-card.open .chapter-body{display:block}

/* ── Topic group ── */
.topic-group{padding:4px 14px 10px}
.topic-hdr{
  display:flex;align-items:center;gap:7px;
  padding:11px 6px 7px;
  font-size:12px;font-weight:700;color:var(--ink2);
}
.topic-dot{width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0}
.topic-idx{color:var(--muted);font-weight:600}

/* ── Training rows ── */
.training-list{display:flex;flex-direction:column;gap:3px;padding-bottom:4px}
.training-row{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:background .14s,border-color .14s;
  border:1px solid transparent;
  text-decoration:none;
}
.training-row:hover{background:rgba(0,0,0,.035);border-color:var(--border)}
.training-row:active{background:rgba(0,0,0,.07)}
.tr-icon{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  background:rgba(0,0,0,.05);
  display:grid;place-items:center;transition:background .14s;
}
.tr-icon svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2}
.training-row.s-passed   .tr-icon{background:var(--green-soft)}
.training-row.s-passed   .tr-icon svg{stroke:var(--green2)}
.training-row.s-progress .tr-icon{background:var(--blue-soft)}
.training-row.s-progress .tr-icon svg{stroke:var(--blue2)}
.training-row.s-failed   .tr-icon{background:var(--orange-soft)}
.training-row.s-failed   .tr-icon svg{stroke:var(--orange)}
.tr-body{flex:1;min-width:0}
.tr-title{
  font-size:13px;font-weight:600;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tr-meta{
  font-size:11px;color:var(--muted);margin-top:2px;
  display:flex;align-items:center;gap:5px;
}
.tr-meta svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2}
.tr-right{display:flex;align-items:center;gap:7px;flex-shrink:0}

/* Status badges */
.sbadge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:700;white-space:nowrap;line-height:1.4;
}
.sbadge.not-viewed{background:rgba(0,0,0,.06);color:var(--muted)}
.sbadge.in-progress{background:var(--blue-soft);color:var(--blue2)}
.sbadge.passed{background:var(--green-soft);color:var(--green2)}
.sbadge.failed{background:var(--orange-soft);color:var(--orange)}

/* Mini progress bar */
.mini-bar{
  width:40px;height:3px;border-radius:2px;
  background:rgba(0,0,0,.1);overflow:hidden;flex-shrink:0;
}
.mini-fill{height:100%;border-radius:2px;transition:width .6s ease}
.sbadge.in-progress .mini-fill{background:var(--blue2)}
.sbadge.passed .mini-fill{background:var(--green2)}
.sbadge.failed .mini-fill{background:var(--orange)}

.tr-chevron{width:14px;height:14px;stroke:var(--muted);fill:none;opacity:.4;flex-shrink:0;stroke-width:2.5}

/* ── Empty / skeleton states ── */
.empty-state{
  background:var(--surface);border-radius:16px;
  border:1px solid var(--border);
  text-align:center;padding:48px 24px;color:var(--muted);
}
.empty-state svg{width:44px;height:44px;stroke:var(--border2);fill:none;margin-bottom:10px;stroke-width:1.5}
.empty-state p{font-size:14px;font-weight:500}

.skel{
  background:linear-gradient(90deg,#f0f2f5 25%,#e8eaed 50%,#f0f2f5 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:8px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:#1a1a1a;color:#fff;
  padding:10px 20px;border-radius:10px;
  font-size:13px;font-weight:600;z-index:9999;
  opacity:0;transition:all .28s ease;pointer-events:none;
  box-shadow:var(--sh3);white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Bottom nav (mobile) ── */
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,.97);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:8px 0 max(8px, env(safe-area-inset-bottom));
  display:none;grid-template-columns:repeat(3,1fr);
}
.bottom-nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 4px;text-decoration:none;
  font-size:10px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;
}
.bottom-nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2}
.bottom-nav-item.active{color:var(--red)}

/* ── Responsive ── */
@media(max-width:800px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .hero{padding:20px;gap:16px}
  .hero-ring-wrap{display:none}
  .nav-links{display:none}
  .nav-user-info{display:none}
  .main{padding-left:16px;padding-right:16px;padding-bottom:90px}
  .chapter-right .ch-pill.done,.chapter-right .ch-pill.prog{display:none}
  .bottom-nav{display:grid}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr}
  .filter-chip{padding:5px 10px;font-size:11px}
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- Loading -->
<div id="loadingScreen">
  <div class="loading-logo">
    <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
  </div>
</div>

<!-- Nav -->
<nav class="nav">
  <a href="index.html" class="nav-brand">
    <div class="nav-brand-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="nav-brand-text">
      <span class="nav-brand-title">МОНОС ХҮНС ХК</span>
      <span class="nav-brand-sub">ХАБ-ын алба</span>
    </div>
  </a>
  <div class="nav-divider"></div>
  <div class="nav-links">
    <a href="employee.html" class="nav-link active">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Сургалт

<script>
/* ── Firebase init ── */
firebase.initializeApp({

  messagingSenderId:"562718693736",
  appId:"1:562718693736:web:0fd550284fb40973d41edd"
});
const auth = firebase.auth();
const db   = firebase.firestore();

/* ── App state ── */
let currentUser  = null;
let userProfile  = null;
let chaptersData = [];   // [{chapter, topics:[{topic, trainings:[]}]}]
let progressMap  = {};   // {trainingId: data}
let activeFilter = 'all';
let searchQuery  = '';

/* ── Canvas particle network ── */
(function(){
  const cv  = document.getElementById('bgCanvas');
  const ctx = cv.getContext('2d');
  let W,H,nodes=[];
  const N=50;
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;init()}
  function init(){
    nodes=[];
    for(let i=0;i<N;i++)
      nodes.push({x:Math.random()*W,y:Math.random()*H,
        vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()*1.8+.8});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<nodes.length;i++){
      const a=nodes[i];
      a.x+=a.vx;a.y+=a.vy;
      if(a.x<0||a.x>W)a.vx*=-1;
      if(a.y<0||a.y>H)a.vy*=-1;
      ctx.beginPath();
      ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,.12)';
      ctx.fill();
      for(let j=i+1;j<nodes.length;j++){
        const b=nodes[j];
        const d=Math.hypot(a.x-b.x,a.y-b.y);
        if(d<105){
          ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
          ctx.strokeStyle=`rgba(0,0,0,${.055*(1-d/105)})`;
          ctx.lineWidth=1;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  resize();draw();
  addEventListener('resize',resize);
})();

/* ── Session Time Tracker ── */
const Tracker = {
  startMs: null,
  pending: 0,
  timer: null,
  PAGE: 'employee',

  init() {
    this.startMs = document.hidden ? null : Date.now();
    document.addEventListener('visibilitychange', () => {
      if(document.hidden){
        if(this.startMs!==null){ this.pending+=Date.now()-this.startMs; this.startMs=null; }
      } else {
        this.startMs=Date.now();
      }
    });
    window.addEventListener('pagehide', ()=>this.flush());
    window.addEventListener('beforeunload', ()=>this.flush());
    this.timer = setInterval(()=>this.flush(), 120000);
  },

  elapsedSecs(){
    let ms=this.pending;
    if(this.startMs!==null) ms+=Date.now()-this.startMs;
    return Math.floor(ms/1000);
  },

  async flush(){
    const secs=this.elapsedSecs();
    if(!currentUser||secs<3) return;
    // Reset before async to prevent double-counting
    this.pending=0;
    this.startMs=document.hidden?null:Date.now();
    try{
      await Promise.all([
        db.collection('users').doc(currentUser.uid).update({
          totalSiteTime: firebase.firestore.FieldValue.increment(secs)
        }),
        db.collection('activity_logs').add({
          userId: currentUser.uid,
          page: this.PAGE,
          duration: secs,
          date: new Date().toISOString().slice(0,10),
          ts: firebase.firestore.FieldValue.serverTimestamp()
        })
      ]);
    } catch(e){
      // Restore on failure so next flush includes it
      this.pending += secs*1000;
    }
  }
};

/* ── Auth guard ── */
auth.onAuthStateChanged(async user=>{
  if(!user){ location.replace('index.html'); return; }
  // Verify user still exists on server (deletion check)
  try{ await user.reload(); }
  catch(e){ await auth.signOut(); location.replace('index.html'); return; }
  if(!auth.currentUser){ location.replace('index.html'); return; }
  currentUser=auth.currentUser;
  Tracker.init();
  await loadDashboard();
});

/* ── Main loader ── */
async function loadDashboard(){
  try{
    /* 1. User profile */
    const uSnap = await db.collection('users').doc(currentUser.uid).get();
    userProfile = uSnap.exists
      ? uSnap.data()
      : {email:currentUser.email,firstName:'',lastName:'',position:'',department:''};
    renderUserUI();

    /* 2. Training progress (all in one query) */
    const progSnap = await db.collection('training_progress')
      .where('userId','==',currentUser.uid).get();
    progressMap={};
    progSnap.forEach(d=>{ progressMap[d.data().trainingId]=d.data(); });

    /* 3. Load only trainings invited to this user */
    const trSnap = await db.collection('trainings')
      .where('invitedEmployees','array-contains',currentUser.uid).get();
    const invitedDocs = trSnap.docs.filter(d=>d.data().isActive!==false);

    if(invitedDocs.length===0){
      chaptersData=[];
      computeStats();
      renderChapters();
      hideLoading();
      return;
    }

    /* 4. Load chapters/topics for the invited trainings */
    const topicIdsNeeded = new Set(invitedDocs.map(d=>d.data().topicId).filter(Boolean));
    const chapterIdsNeeded = new Set(invitedDocs.map(d=>d.data().chapterId).filter(Boolean));

    const [tpSnap, chapSnap] = await Promise.all([
      db.collection('topics').get(),
      db.collection('chapters').get()
    ]);

    const allTopics = tpSnap.docs.filter(d=>topicIdsNeeded.has(d.id));
    const allChapters = chapSnap.docs
      .filter(d=>chapterIdsNeeded.has(d.id))
      .sort((a,b)=>(a.data().order||0)-(b.data().order||0));

    chaptersData = allChapters.map(chDoc=>{
      const topics = allTopics
        .filter(t=>t.data().chapterId===chDoc.id)
        .sort((a,b)=>(a.data().order||0)-(b.data().order||0))
        .map(tpDoc=>{
          const trainings = invitedDocs
            .filter(tr=>tr.data().topicId===tpDoc.id)
            .sort((a,b)=>(a.data().order||0)-(b.data().order||0));
          return {topic:tpDoc, trainings};
        })
        .filter(({trainings})=>trainings.length>0);
      return {chapter:chDoc, topics};
    }).filter(({topics})=>topics.length>0);

    computeStats();
    renderChapters();
    hideLoading();
  } catch(err){
    console.error(err);
    showToast('Мэдээлэл ачаалахад алдаа гарлаа');
    hideLoading();
  }
}

/* ── User UI ── */
function renderUserUI(){
  const fn = userProfile.firstName||'';
  const ln = userProfile.lastName||'';
  const name = [ln,fn].filter(Boolean).join(' ') || userProfile.email || '—';
  const initials = getInitials(name);
  const dept = userProfile.department||'';
  const pos  = userProfile.position||'';

  document.getElementById('heroName').textContent = name;
  document.getElementById('heroAvatar').textContent = initials;
  document.getElementById('heroDept').textContent = dept||'Хэлтэс тодорхойгүй';
  document.getElementById('heroPos').textContent  = pos ||'Албан тушаал тодорхойгүй';
  document.getElementById('heroDate').textContent = fmtDate(new Date());
  document.getElementById('navName').textContent  = name;
  document.getElementById('navPos').textContent   = pos||dept;
  document.getElementById('navAvatar').textContent= initials;
}

function getInitials(n){
  const p=n.trim().split(/\s+/);
  return p.length>=2?(p[0][0]+(p[1][0]||'')).toUpperCase():(n[0]||'?').toUpperCase();
}
function fmtDate(d){
  const DN=['Ням','Даваа','Мягмар','Лхагва','Пүрэв','Баасан','Бямба'];
  return `${d.getFullYear()}/${zp(d.getMonth()+1)}/${zp(d.getDate())} — ${DN[d.getDay()]}`;
}
function zp(n){return String(n).padStart(2,'0')}

/* ── Stats computation ── */
function computeStats(){
  let total=0,done=0,scoreSum=0,scoreCt=0;

  chaptersData.forEach(({topics})=>topics.forEach(({trainings})=>trainings.forEach(tr=>{
    total++;
    const p=progressMap[tr.id];
    if(p&&p.status==='passed'){
      done++;
      if(p.score!=null){scoreSum+=p.score;scoreCt++;}
    }
  })));

  /* Stat cards */
  const cEl=document.getElementById('sCompleted');
  cEl.innerHTML=`${done}<sub>/${total}</sub>`;
  document.getElementById('sCompletedHint').textContent=`нийт ${total} сургалтаас`;

  /* Real site time from user profile */
  const totalSecs = userProfile.totalSiteTime||0;
  const hrs=Math.floor(totalSecs/3600),mins=Math.floor((totalSecs%3600)/60);
  const tEl=document.getElementById('sTime');
  tEl.innerHTML=hrs>0?`${hrs}<sub>ц ${mins}м</sub>`:`${mins}<sub>мин</sub>`;

  const avg=scoreCt>0?Math.round(scoreSum/scoreCt):null;
  document.getElementById('sAvg').innerHTML=avg!=null?`${avg}<sub>%</sub>`:`—`;

  /* Ring */
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('ringPct').textContent=`${pct}%`;
  document.getElementById('sectionMeta').textContent=`${done}/${total} дуусгасан`;
  /* 2π×33 ≈ 207.3 */
  const circ=2*Math.PI*33;
  const offset=circ*(1-pct/100);
  const rf=document.getElementById('ringFill');
  rf.style.strokeDasharray=circ;
  rf.style.strokeDashoffset=circ;
  setTimeout(()=>{ rf.style.strokeDashoffset=offset; },350);
}

/* ── Render chapters ── */
function renderChapters(){
  const list=document.getElementById('chapterList');
  list.innerHTML='';
  let anyVisible=false;

  chaptersData.forEach(({chapter,topics},ci)=>{
    const chData=chapter.data();

    /* Count visible trainings in this chapter */
    let chTotal=0,chDone=0,chProg=0;
    const visTopics=topics.map(({topic,trainings})=>{
      const vis=trainings.filter(t=>trainingVisible(t));
      vis.forEach(t=>{
        chTotal++;
        const p=progressMap[t.id];
        if(p?.status==='passed') chDone++;
        else if(p?.status==='in_progress') chProg++;
      });
      return {topic,trainings:vis};
    }).filter(({trainings})=>trainings.length>0);

    if(chTotal===0) return;
    anyVisible=true;

    const card=document.createElement('div');
    card.className='chapter-card';

    let pillsHtml='';
    if(chDone>0)  pillsHtml+=`<span class="ch-pill done">✓ ${chDone}</span>`;
    if(chProg>0)  pillsHtml+=`<span class="ch-pill prog">${chProg} явж байна</span>`;
    pillsHtml+=`<span class="ch-pill total">${chTotal} сургалт</span>`;

    card.innerHTML=`
      <div class="chapter-head" onclick="toggleChapter(this)">
        <div class="chapter-num">${ci+1}</div>
        <div class="chapter-info">
          <div class="chapter-title">${esc(chData.title||'')}</div>
          ${chData.description?`<div class="chapter-desc">${esc(chData.description)}</div>`:''}
        </div>
        <div class="chapter-right">${pillsHtml}</div>
        <svg class="chapter-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="chapter-body">${buildTopicsHTML(visTopics)}</div>`;

    card.classList.add('open');

    list.appendChild(card);
  });

  if(!anyVisible){
    list.innerHTML=`<div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <p>Тохирох сургалт олдсонгүй</p>
    </div>`;
  }
}

function buildTopicsHTML(topics){
  if(!topics.length) return '<div style="padding:14px 20px;font-size:12px;color:var(--muted)">Сургалт байхгүй</div>';
  return topics.map(({topic,trainings},ti)=>`
    <div class="topic-group">
      <div class="topic-hdr">
        <div class="topic-dot"></div>
        <span class="topic-idx">${ti+1}.</span>
        ${esc(topic.data().title||'')}
      </div>
      <div class="training-list">
        ${trainings.map(t=>buildTrainingRow(t)).join('')}
      </div>
    </div>`).join('');
}

function buildTrainingRow(tDoc){
  const t=tDoc.data();
  const p=progressMap[tDoc.id];
  const status=p?.status||'not_viewed';
  const score=p?.score;
  const watchPct=p?.watchProgress!=null?Math.round(p.watchProgress*100):0;
  const dur=t.duration||0;

  let sClass='';
  let badgeHtml='';

  if(status==='passed'){
    sClass='s-passed';
    badgeHtml=`<span class="sbadge passed">✓ Тэнцсэн${score!=null?` · ${score}%`:''}</span>`;
  } else if(status==='in_progress'){
    sClass='s-progress';
    badgeHtml=`<span class="sbadge in-progress">
      ${watchPct}% үзсэн
      <div class="mini-bar"><div class="mini-fill" style="width:${watchPct}%"></div></div>
    </span>`;
  } else if(status==='failed'){
    sClass='s-failed';
    badgeHtml=`<span class="sbadge failed">Тэнцсэнгүй${score!=null?` · ${score}%`:''}</span>`;
  } else {
    badgeHtml=`<span class="sbadge not-viewed">Үзээгүй</span>`;
  }

  const durHtml=dur>0
    ?`<span class="tr-duration" style="display:flex;align-items:center;gap:3px">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${dur}мин
      </span>`
    :'';

  const passHtml=t.passingScore?`<span>· Тэнцэх: ${t.passingScore}%</span>`:'';

  return `<div class="training-row ${sClass}" onclick="openTraining('${esc(tDoc.id)}')">
    <div class="tr-icon">
      <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </div>
    <div class="tr-body">
      <div class="tr-title">${esc(t.title||'')}</div>
      <div class="tr-meta">${durHtml}${passHtml}</div>
    </div>
    <div class="tr-right">
      ${badgeHtml}
      <svg class="tr-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>`;
}

/* ── Visibility filter ── */
function trainingVisible(tDoc){
  const p=progressMap[tDoc.id];
  const status=p?.status||'not_viewed';

  if(activeFilter==='not_viewed'  && status!=='not_viewed')  return false;
  if(activeFilter==='in_progress' && status!=='in_progress') return false;
  if(activeFilter==='passed'      && status!=='passed')      return false;

  if(searchQuery){
    const title=(tDoc.data().title||'').toLowerCase();
    if(!title.includes(searchQuery)) return false;
  }
  return true;
}

/* ── Filter / search handlers ── */
function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderChapters();
}
function handleSearch(){
  searchQuery=document.getElementById('searchInput').value.toLowerCase().trim();
  renderChapters();
}

/* ── Accordion toggle ── */
function toggleChapter(head){
  head.closest('.chapter-card').classList.toggle('open');
}

/* ── Navigate to training ── */
function openTraining(id){
  location.href=`training-view.html?id=${encodeURIComponent(id)}`;
}

/* ── Logout ── */
function doLogout(){
  auth.signOut().then(()=>location.replace('index.html'));
}

/* ── Loading overlay ── */
function hideLoading(){
  const ls=document.getElementById('loadingScreen');
  ls.classList.add('fade-out');
  setTimeout(()=>ls.remove(),450);
}

/* ── Toast ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

/* ── HTML escape ── */
function esc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
