<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}
:root{
  --red:#E30613;--red2:#FF2040;
  --red-dark:#B00510;--red-soft:rgba(227,6,19,.08);
  --gold:#F59E0B;--gold2:#FCD34D;
  --blue:#3B82F6;--blue2:#2563EB;--blue-soft:rgba(59,130,246,.10);
  --green:#10B981;--green2:#059669;--green-soft:rgba(16,185,129,.10);
  --orange:#F97316;--orange-soft:rgba(249,115,22,.10);
  --ink:#0F1117;--ink2:#374151;--muted:#6B7280;
  --bg:#F4F6FB;--surface:#FFFFFF;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.11);
  --sh1:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.07);
  --sh2:0 4px 8px rgba(0,0,0,.05),0 12px 32px rgba(0,0,0,.09);
  --sh3:0 8px 16px rgba(0,0,0,.05),0 24px 60px rgba(0,0,0,.11);
  --sh4:0 16px 32px rgba(0,0,0,.05),0 48px 100px rgba(0,0,0,.13);
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.5}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:orbDrift ease-in-out infinite}
.orb1{width:700px;height:700px;top:-200px;left:-150px;background:radial-gradient(circle,rgba(227,6,19,.07) 0%,transparent 65%);filter:blur(80px);animation-duration:22s}
.orb2{width:500px;height:500px;bottom:-150px;right:-100px;background:radial-gradient(circle,rgba(245,158,11,.06) 0%,transparent 65%);filter:blur(70px);animation-duration:28s;animation-delay:-11s}
@keyframes orbDrift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(24px,-30px) scale(1.05)}66%{transform:translate(-18px,22px) scale(.97)}}

/* Loading */
#loadingScreen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .4s ease}
#loadingScreen.fade-out{opacity:0;pointer-events:none}
.loading-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--red),var(--red-dark));display:grid;place-items:center;animation:loadPulse 1.4s ease-in-out infinite}
@keyframes loadPulse{0%,100%{box-shadow:0 0 0 0 rgba(227,6,19,.3);transform:scale(1)}50%{box-shadow:0 0 0 16px rgba(227,6,19,0);transform:scale(1.05)}}
.loading-logo svg{width:34px;height:34px;fill:none;stroke:#fff;stroke-width:2}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);box-shadow:var(--sh1);display:flex;align-items:center;padding:0 20px;gap:10px}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.nav-brand-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--red),var(--red-dark));display:grid;place-items:center;flex-shrink:0}
.nav-brand-logo svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}
.nav-brand-text{display:flex;flex-direction:column}
.nav-brand-title{font-size:13px;font-weight:800;color:var(--ink);line-height:1.2}
.nav-brand-sub{font-size:10px;color:var(--muted);font-weight:600}
.nav-divider{width:1px;height:24px;background:var(--border2);flex-shrink:0}
.nav-links{display:flex;align-items:center;gap:2px;flex:1}
.nav-link{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;transition:all .18s;white-space:nowrap}
.nav-link:hover{color:var(--ink);background:rgba(0,0,0,.05)}
.nav-link.active{color:var(--red);background:var(--red-soft)}
.nav-link svg{width:16px;height:16px;stroke:currentColor;fill:none;flex-shrink:0;stroke-width:2}
.nav-user{display:flex;align-items:center;gap:10px;margin-left:auto}
.nav-user-info{display:flex;flex-direction:column;align-items:flex-end}
.nav-name{font-size:13px;font-weight:700;color:var(--ink)}
.nav-pos{font-size:11px;color:var(--muted)}
.nav-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--red),var(--gold));display:grid;place-items:center;font-size:13px;font-weight:700;color:#fff;border:2px solid #fff;box-shadow:var(--sh1)}
.btn-logout{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);border:1px solid var(--border2);background:#fff;cursor:pointer;transition:all .18s;font-family:inherit}
.btn-logout:hover{color:var(--red);border-color:rgba(227,6,19,.3);background:var(--red-soft)}
.btn-logout svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
@media(max-width:640px){.nav-links{display:none}}

/* Main */
.main{position:relative;z-index:10;padding-top:calc(var(--nav-h)+28px);padding-bottom:64px;max-width:860px;margin:0 auto;padding-left:24px;padding-right:24px}

/* Page header */
.page-hdr{margin-bottom:24px;animation:fadeUp .45s cubic-bezier(.2,.8,.2,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.page-hdr-title{font-size:26px;font-weight:800;color:var(--ink);margin-bottom:4px}
.page-hdr-sub{font-size:14px;color:var(--muted)}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;animation:fadeUp .45s .06s cubic-bezier(.2,.8,.2,1) both}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);box-shadow:var(--sh1);padding:18px 20px;display:flex;align-items:flex-start;gap:14px;transition:transform .2s,box-shadow .2s;cursor:default}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.stat-icon{width:42px;height:42px;border-radius:11px;flex-shrink:0;display:grid;place-items:center}
.stat-icon svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2}
.stat-icon.red{background:var(--red-soft);color:var(--red)}
.stat-icon.blue{background:var(--blue-soft);color:var(--blue2)}
.stat-icon.green{background:var(--green-soft);color:var(--green2)}
.stat-icon.gold{background:rgba(245,158,11,.10);color:var(--gold)}
.stat-body{flex:1;min-width:0}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.stat-value{font-size:24px;font-weight:800;color:var(--ink);line-height:1.1;margin-bottom:2px}
.stat-value sub{font-size:13px;font-weight:600;color:var(--muted);vertical-align:baseline}
.stat-hint{font-size:11px;color:var(--muted)}

/* Section header */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;animation:fadeUp .45s .1s cubic-bezier(.2,.8,.2,1) both}
.section-title{font-size:16px;font-weight:700;color:var(--ink)}

/* Filter tabs */
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap}
.ftab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:#fff;color:var(--muted);transition:all .16s;font-family:inherit}
.ftab.active{background:var(--red);color:#fff;border-color:var(--red)}
.ftab:hover:not(.active){background:rgba(0,0,0,.04);color:var(--ink)}

/* Results list */
.results-list{display:flex;flex-direction:column;gap:10px;animation:fadeUp .45s .12s cubic-bezier(.2,.8,.2,1) both}

/* Result card */
.result-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);box-shadow:var(--sh1);padding:18px 20px;display:flex;align-items:center;gap:16px;transition:transform .18s,box-shadow .18s;cursor:default}
.result-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.result-card.passed-card{border-left:3px solid var(--green2)}
.result-card.failed-card{border-left:3px solid var(--orange)}
.score-badge{width:52px;height:52px;border-radius:14px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800}
.score-badge.passed{background:var(--green-soft);color:var(--green2)}
.score-badge.failed{background:var(--orange-soft);color:var(--orange)}
.score-badge .score-num{font-size:18px;line-height:1}
.score-badge .score-pct{font-size:10px;font-weight:700;opacity:.7}
.result-body{flex:1;min-width:0}
.result-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.result-meta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.result-meta-item svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.result-status{flex-shrink:0}
.rstatus{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:700}
.rstatus.passed{background:var(--green-soft);color:var(--green2)}
.rstatus.failed{background:var(--orange-soft);color:var(--orange)}
.rstatus.in-progress{background:var(--blue-soft);color:var(--blue2)}

/* Training progress summary table */
.progress-table{background:var(--surface);border-radius:16px;border:1px solid var(--border);box-shadow:var(--sh1);overflow:hidden;margin-bottom:24px;animation:fadeUp .45s .08s cubic-bezier(.2,.8,.2,1) both}
.progress-table table{width:100%;border-collapse:collapse}
.progress-table thead tr{border-bottom:1px solid var(--border)}
.progress-table th{padding:11px 16px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;text-align:left;white-space:nowrap}
.progress-table td{padding:12px 16px;font-size:13px;color:var(--ink);border-bottom:1px solid var(--border);vertical-align:middle}
.progress-table tr:last-child td{border-bottom:none}
.progress-table tr:hover td{background:rgba(0,0,0,.015)}
.mini-bar-wrap{width:80px;height:6px;background:rgba(0,0,0,.07);border-radius:3px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:3px;background:var(--blue2);transition:width .6s ease}
.mini-bar-fill.done{background:var(--green2)}

/* Empty state */
.empty-state{background:var(--surface);border-radius:16px;border:1px solid var(--border);box-shadow:var(--sh1);padding:48px 24px;text-align:center}
.empty-icon{width:56px;height:56px;border-radius:14px;background:rgba(0,0,0,.04);display:grid;place-items:center;margin:0 auto 14px}
.empty-icon svg{width:26px;height:26px;stroke:var(--muted);fill:none;stroke-width:1.5}
.empty-title{font-size:16px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--muted)}
.empty-link{display:inline-block;margin-top:16px;padding:9px 20px;border-radius:10px;background:var(--red);color:#fff;font-size:13px;font-weight:700;text-decoration:none;transition:background .18s}
.empty-link:hover{background:var(--red-dark)}
</style>
</head>

<script>
if(!firebase.apps.length){
  firebase.initializeApp({
    apiKey:"AIzaSyCXodBPWqm3TTZuJieHkkcu2lLtH5l7IJ0",
    authDomain:"monos-hk-alba.firebaseapp.com",
    projectId:"monos-hk-alba",
    storageBucket:"monos-hk-alba.firebasestorage.app",
    messagingSenderId:"562718693736",
    appId:"1:562718693736:web:0fd550284fb40973d41edd"
  });
}
const auth = firebase.auth();
const db   = firebase.firestore();

let currentUser = null;
let allResults  = [];
let currentFilter = 'all';

/* ── Session time tracker ── */
const Tracker = {
  startMs: null, pending: 0, timer: null, PAGE: 'my-results',
  init() {
    this.startMs = document.hidden ? null : Date.now();
    document.addEventListener('visibilitychange', () => {
      if(document.hidden){
        if(this.startMs!==null){ this.pending+=Date.now()-this.startMs; this.startMs=null; }
      } else {
        this.startMs = Date.now();
      }
    });
    window.addEventListener('pagehide',    () => this.flush());
    window.addEventListener('beforeunload',() => this.flush());
    this.timer = setInterval(() => this.flush(), 120000);
  },
  elapsedSecs() {
    let ms = this.pending;
    if(this.startMs !== null) ms += Date.now() - this.startMs;
    return Math.floor(ms / 1000);
  },
  async flush() {
    const secs = this.elapsedSecs();
    if(!currentUser || secs < 3) return;
    this.pending = 0;
    this.startMs = document.hidden ? null : Date.now();
    try {
      await Promise.all([
        db.collection('users').doc(currentUser.uid).update({
          totalSiteTime: firebase.firestore.FieldValue.increment(secs)
        }),
        db.collection('activity_logs').add({
          userId: currentUser.uid, page: this.PAGE,
          duration: secs,
          date: new Date().toISOString().slice(0,10),
          ts: firebase.firestore.FieldValue.serverTimestamp()
        })
      ]);
    } catch(e) { this.pending += secs * 1000; }
  }
};

/* ── Auth ── */
auth.onAuthStateChanged(async user => {
  if(!user){ location.replace('index.html'); return; }
  try{ await user.reload(); }catch(e){ await auth.signOut(); location.replace('index.html'); return; }
  if(!auth.currentUser){ location.replace('index.html'); return; }
  currentUser = auth.currentUser;
  Tracker.init();
  await loadPage();
  hideLoading();
});

function hideLoading(){
  const s = document.getElementById('loadingScreen');
  s.classList.add('fade-out');
  setTimeout(() => s.style.display='none', 450);
}

/* ── Background canvas ── */
(function(){
  const c=document.getElementById('bgCanvas');
  if(!c) return;
  const ctx=c.getContext('2d');
  let W,H;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  const pts=Array.from({length:40},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25}));
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
      ctx.fillStyle='rgba(99,102,241,.15)';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Load all data ── */
async function loadPage() {
  try {
    /* 1. User profile for nav */
    const uSnap = await db.collection('users').doc(currentUser.uid).get();
    const uData = uSnap.exists ? uSnap.data() : {email:currentUser.email};
    const fn=uData.firstName||''; const ln=uData.lastName||'';
    const name=[ln,fn].filter(Boolean).join(' ')||uData.email||'—';
    const initials=getInitials(name);
    document.getElementById('navName').textContent=name;
    document.getElementById('navPos').textContent=uData.position||uData.department||'';
    document.getElementById('navAvatar').textContent=initials;
    document.getElementById('pageSubTitle').textContent=`${name} — шалгалтын түүх`;

    /* 2. Exam results, ordered newest first */
    const rSnap = await db.collection('exam_results')
      .where('userId','==',currentUser.uid).get();
    const rawResults = rSnap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>{
        const ta=a.timestamp?.toMillis?.()||0;
        const tb=b.timestamp?.toMillis?.()||0;
        return tb-ta;
      });

    /* 3. Training progress for summary table */
    const pSnap = await db.collection('training_progress')
      .where('userId','==',currentUser.uid).get();
    const progressMap = {};
    pSnap.forEach(d => { progressMap[d.data().trainingId] = d.data(); });

    /* 4. Fetch training names for all trainingIds we've seen */
    const trainingIds = [...new Set([
      ...rawResults.map(r=>r.trainingId),
      ...pSnap.docs.map(d=>d.data().trainingId)
    ].filter(Boolean))];

    const trainingMap = {};
    if(trainingIds.length) {
      /* Firestore 'in' query supports up to 30 items; chunk if needed */
      const chunks = [];
      for(let i=0;i<trainingIds.length;i+=30) chunks.push(trainingIds.slice(i,i+30));
      await Promise.all(chunks.map(async chunk => {
        const snap = await db.collection('trainings').where(firebase.firestore.FieldPath.documentId(),'in',chunk).get();
        snap.forEach(d => { trainingMap[d.id] = d.data(); });
      }));
    }

    /* Attach training titles to results */
    allResults = rawResults.map(r => ({
      ...r,
      trainingTitle: trainingMap[r.trainingId]?.title || 'Сургалт (устсан)',
      passingScore: trainingMap[r.trainingId]?.passingScore || 70
    }));

    /* 5. Compute stats */
    const total   = allResults.length;
    const passed  = allResults.filter(r=>r.passed).length;
    const scores  = allResults.map(r=>r.score).filter(s=>s!=null);
    const avg     = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;
    const completed = Object.values(progressMap).filter(p=>p.status==='passed').length;
    const totalTr = Object.keys(progressMap).length;

    document.getElementById('statTotal').textContent = total||'0';
    document.getElementById('statPassed').textContent = passed||'0';
    document.getElementById('statPassedHint').textContent = total
      ? `нийт ${total}-с (${Math.round(passed/total*100)}%)`
      : 'удаа';
    document.getElementById('statAvg').textContent = avg!=null ? avg+'%' : '—';
    document.getElementById('statCompleted').textContent = completed||'0';
    document.getElementById('statCompletedHint').textContent =
      totalTr>0 ? `нийт ${totalTr}-с` : 'сургалт';

    /* 6. Progress table (trainings with progress) */
    if(Object.keys(progressMap).length) {
      renderProgressTable(progressMap, trainingMap);
    }

    /* 7. Results list */
    renderResults();

    /* Filter tab handlers */
    document.querySelectorAll('.ftab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderResults();
      });
    });

  } catch(err) {
    console.error(err);
    document.getElementById('resultsList').innerHTML =
      '<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="empty-title">Алдаа гарлаа</div><div class="empty-sub">'+escHtml(err.message)+'</div></div>';
  }
}

/* ── Render progress summary table ── */
function renderProgressTable(progressMap, trainingMap) {
  const hdr = document.getElementById('progressHdr');
  const wrap = document.getElementById('progressTableWrap');
  const rows = Object.values(progressMap).map(p => {
    const t = trainingMap[p.trainingId] || {};
    return {...p, trainingTitle: t.title||'Сургалт (устсан)', passingScore: t.passingScore||70};
  }).sort((a,b) => {
    const order = {passed:0, failed:1, in_progress:2};
    return (order[a.status]||3) - (order[b.status]||3);
  });

  const statusLabel = {passed:'Тэнцсэн', failed:'Тэнцсэнгүй', in_progress:'Явцтай'};
  const statusClass = {passed:'passed', failed:'failed', in_progress:'in-progress'};

  wrap.innerHTML = `<div class="progress-table">
    <table>
      <thead><tr>
        <th>#</th>
        <th>Сургалт</th>
        <th>Явц</th>
        <th>Оноо</th>
        <th>Оролдлого</th>
        <th>Төлөв</th>
      </tr></thead>
      <tbody>${rows.map((p,i)=>{
        const wpct = Math.round((p.watchProgress||0)*100);
        const sc   = p.score!=null ? p.score+'%' : '—';
        const att  = p.attempts||1;
        const st   = p.status||'in_progress';
        return `<tr>
          <td style="color:var(--muted);font-size:12px">${i+1}</td>
          <td style="font-weight:600;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(p.trainingTitle)}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="mini-bar-wrap"><div class="mini-bar-fill${st==='passed'?' done':''}" style="width:${wpct}%"></div></div>
              <span style="font-size:12px;color:var(--muted)">${wpct}%</span>
            </div>
          </td>
          <td><span style="font-size:13px;font-weight:700;color:${st==='passed'?'var(--green2)':st==='failed'?'var(--orange)':'var(--muted)'}">${sc}</span></td>
          <td style="font-size:13px;color:var(--muted)">${att}</td>
          <td><span class="rstatus ${statusClass[st]||'in-progress'}">${statusLabel[st]||'Явцтай'}</span></td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div>`;
  hdr.style.display='flex';
  wrap.style.display='block';
}

/* ── Render exam results ── */
function renderResults() {
  const list = document.getElementById('resultsList');
  const filtered = currentFilter === 'all'
    ? allResults
    : currentFilter === 'passed'
      ? allResults.filter(r=>r.passed)
      : allResults.filter(r=>!r.passed);

  if(!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="empty-title">${allResults.length ? 'Тохирох үр дүн байхгүй' : 'Одоохондоо шалгалт өгөөгүй байна'}</div>
      <div class="empty-sub">${allResults.length ? 'Өөр шүүлтүүр сонгоно уу' : 'Сургалт дүүргээд шалгалт өгнө үү'}</div>
      ${!allResults.length ? '<a href="employee.html" class="empty-link">Сургалт харах</a>' : ''}
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(r => {
    const score = r.score != null ? r.score : 0;
    const passed = r.passed;
    const date = fmtTimestamp(r.timestamp);
    const correct = r.correct != null ? r.correct : '—';
    const total   = r.total   != null ? r.total   : '—';
    return `<div class="result-card ${passed?'passed-card':'failed-card'}">
      <div class="score-badge ${passed?'passed':'failed'}">
        <span class="score-num">${score}</span>
        <span class="score-pct">%</span>
      </div>
      <div class="result-body">
        <div class="result-title">${escHtml(r.trainingTitle)}</div>
        <div class="result-meta">
          <span class="result-meta-item">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${date}
          </span>
          <span class="result-meta-item">
            <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            ${correct}/${total} зөв
          </span>
          <span class="result-meta-item">
            Тэнцэх: ${r.passingScore||70}%
          </span>
        </div>
      </div>
      <div class="result-status">
        <span class="rstatus ${passed?'passed':'failed'}">${passed?'✓ Тэнцсэн':'✗ Тэнцсэнгүй'}</span>
      </div>
    </div>`;
  }).join('');
}

/* ── Helpers ── */
function getInitials(n){
  const p=n.trim().split(/\s+/);
  return p.length>=2?(p[0][0]+(p[1][0]||'')).toUpperCase():(n[0]||'?').toUpperCase();
}

function fmtTimestamp(ts){
  if(!ts) return '—';
  let d;
  if(ts.toDate) d=ts.toDate();
  else if(ts.seconds) d=new Date(ts.seconds*1000);
  else d=new Date(ts);
  if(isNaN(d.getTime())) return '—';
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  const h=String(d.getHours()).padStart(2,'0');
  const min=String(d.getMinutes()).padStart(2,'0');
  return `${y}/${m}/${day} ${h}:${min}`;
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function doLogout(){
  Tracker.flush().finally(()=>auth.signOut().then(()=>location.replace('index.html')));
}
</script>
